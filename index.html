<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Timer & Task Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Pomodoro Timer</h1>
    </header>

    <!-- Timer Section -->
    <section class="timer-section">
      <div class="mode-tabs">
        <button class="mode-btn active" data-mode="pomodoro">Pomodoro</button>
        <button class="mode-btn" data-mode="short">Short Break</button>
        <button class="mode-btn" data-mode="long">Long Break</button>
      </div>

      <div class="timer-display">
        <span id="timer">25:00</span>
      </div>

      <div class="timer-controls">
        <button id="startStopBtn" class="btn-primary">Start</button>
        <button id="resetBtn" class="btn-secondary">Reset</button>
      </div>

      <div class="session-info">
        <span>Session <strong id="sessionCount">1</strong> of 4</span>
        <span>&#9675; &#9675; &#9675; &#9675;</span>
      </div>
    </section>

    <!-- Task Section -->
    <section class="task-section">
      <h2>Task List</h2>

      <form id="taskForm" class="task-form">
        <input
          type="text"
          id="taskInput"
          placeholder="Add a new task..."
          maxlength="100"
          autocomplete="off"
        />
        <button type="submit" class="btn-primary">Add</button>
      </form>

      <div class="task-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <ul id="taskList" class="task-list"></ul>

      <div class="task-footer">
        <span id="taskCount">0 tasks remaining</span>
        <button id="clearCompleted" class="btn-text">Clear Completed</button>
      </div>
    </section>
  </div>

  <audio id="alarmSound" src="https://www.soundjay.com/buttons/sounds/button-09a.mp3" preload="auto"></audio>

  <script src="app.js"></script>
</body>
</html>
